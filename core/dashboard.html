<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS Mark 5</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: #0d1117;
  border-bottom: 1px solid #1e2d3d;
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
header h1 { color: #4db8ff; font-size: 1rem; letter-spacing: 3px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.status-pill {
  font-size: 0.7rem; color: #00d97e;
  background: #00d97e15; border: 1px solid #00d97e30;
  padding: 0.25rem 0.75rem; border-radius: 20px; letter-spacing: 1px;
}
.sol-ticker { font-size: 0.8rem; color: #4db8ff; font-weight: 500; }
.app { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 220px; background: #0d1117;
  border-right: 1px solid #1e2d3d;
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow-y: auto;
}
.sidebar-section { padding: 0.85rem 1rem; border-bottom: 1px solid #1e2d3d; }
.sidebar-section h3 {
  font-size: 0.62rem; color: #4a5568;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.6rem;
}
.new-chat-btn {
  width: 100%; background: #4db8ff15; border: 1px solid #4db8ff40;
  color: #4db8ff; padding: 0.55rem 0.85rem; border-radius: 6px;
  cursor: pointer; font-size: 0.82rem; text-align: left;
  display: flex; align-items: center; gap: 0.5rem; transition: all 0.15s;
}
.new-chat-btn:hover { background: #4db8ff25; }
.chat-history-list { display: flex; flex-direction: column; gap: 2px; }
.history-item {
  padding: 0.45rem 0.65rem; border-radius: 5px; cursor: pointer;
  font-size: 0.8rem; color: #8892a4; transition: all 0.15s;
  display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
}
.history-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-item:hover { background: #1a2332; color: #c9d1d9; }
.history-item.active { background: #1a2332; color: #4db8ff; }
.history-item .del-btn {
  background: none; border: none; color: #4a5568;
  cursor: pointer; font-size: 0.65rem; padding: 0;
  opacity: 0; flex-shrink: 0;
}
.history-item:hover .del-btn { opacity: 1; }
.history-item .del-btn:hover { color: #ff4466; }
.quick-cmd { display: flex; flex-direction: column; gap: 2px; }
.quick-btn {
  background: none; border: none; color: #8892a4;
  padding: 0.38rem 0.65rem; border-radius: 5px; cursor: pointer;
  font-size: 0.8rem; text-align: left; transition: all 0.15s;
}
.quick-btn:hover { background: #1a2332; color: #c9d1d9; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
.stat-item {
  background: #0a0a0f; border: 1px solid #1e2d3d;
  border-radius: 5px; padding: 0.45rem; text-align: center;
}
.stat-val { font-size: 0.85rem; color: #00d97e; font-weight: 600; }
.stat-lbl { font-size: 0.6rem; color: #4a5568; margin-top: 2px; }
.memory-sidebar { display: flex; flex-direction: column; gap: 3px; max-height: 140px; overflow-y: auto; }
.mem-chip {
  background: #0a0a0f; border: 1px solid #1e2d3d; border-radius: 4px;
  padding: 0.28rem 0.45rem; font-size: 0.72rem; color: #8892a4;
  display: flex; justify-content: space-between; align-items: center;
}
.mem-chip .mkey { color: #4db8ff; margin-right: 0.3rem; }
.mem-chip button { background: none; border: none; color: #4a5568; cursor: pointer; font-size: 0.62rem; padding: 0; }
.mem-chip button:hover { color: #ff4466; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-window {
  flex: 1; overflow-y: auto; padding: 1.5rem 2rem;
  display: flex; flex-direction: column; gap: 1.25rem;
}
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.85rem; color: #4a5568;
}
.empty-state h2 { font-size: 1.4rem; color: #4db8ff; letter-spacing: 3px; }
.empty-state p { font-size: 0.82rem; }
.chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 0.25rem; }
.chip {
  background: #0d1117; border: 1px solid #1e2d3d; color: #8892a4;
  padding: 0.45rem 0.9rem; border-radius: 20px; font-size: 0.78rem;
  cursor: pointer; transition: all 0.15s;
}
.chip:hover { border-color: #4db8ff40; color: #4db8ff; background: #4db8ff10; }
.message { display: flex; flex-direction: column; gap: 0.2rem; max-width: 760px; width: 100%; margin: 0 auto; }
.message.user { align-items: flex-end; }
.message.jarvis { align-items: flex-start; }
.msg-label { font-size: 0.65rem; color: #4a5568; letter-spacing: 1px; text-transform: uppercase; padding: 0 0.4rem; }
.msg-bubble { padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.88rem; line-height: 1.65; max-width: 100%; }
.message.user .msg-bubble {
  background: #1a2d4a; border: 1px solid #1e4a7a;
  color: #b8d4f0; border-radius: 10px 10px 3px 10px;
}
.message.jarvis .msg-bubble {
  background: #0d1117; border: 1px solid #1e2d3d;
  color: #c9d1d9; border-radius: 10px 10px 10px 3px;
}
.msg-bubble pre {
  background: #060609; border: 1px solid #1e2d3d; border-radius: 5px;
  padding: 0.7rem; overflow-x: auto; margin: 0.5rem 0;
  font-size: 0.8rem; color: #00d97e; font-family: monospace;
}
.msg-bubble code {
  background: #060609; padding: 0.1rem 0.3rem;
  border-radius: 3px; font-size: 0.8rem; color: #4db8ff; font-family: monospace;
}
.thinking-dots { display: flex; gap: 4px; padding: 0.25rem 0; }
.thinking-dots span {
  width: 6px; height: 6px; background: #4db8ff;
  border-radius: 50%; animation: bounce 1.2s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}
.input-area { padding: 0.85rem 2rem 1.25rem; border-top: 1px solid #1e2d3d; }
.input-wrap {
  max-width: 760px; margin: 0 auto;
  display: flex; align-items: flex-end; gap: 0.5rem;
  background: #0d1117; border: 1px solid #1e2d3d;
  border-radius: 10px; padding: 0.65rem; transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: #4db8ff40; }
.input-wrap textarea {
  flex: 1; background: none; border: none; color: #e0e0e0;
  font-family: inherit; font-size: 0.88rem; line-height: 1.5;
  resize: none; outline: none; max-height: 140px; min-height: 22px;
}
.input-wrap textarea::placeholder { color: #4a5568; }
.send-btn {
  background: #4db8ff; border: none; color: #0a0a0f;
  width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0; font-weight: bold; transition: all 0.15s;
}
.send-btn:hover { background: #7dd3ff; }
.send-btn:disabled { background: #1e2d3d; color: #4a5568; cursor: not-allowed; }
.input-hint { text-align: center; font-size: 0.68rem; color: #4a5568; margin-top: 0.4rem; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>⚡ JARVIS</h1>
  <div class="header-right">
    <span class="sol-ticker" id="sol-ticker">◎ --</span>
    <span class="status-pill" id="status-pill">● CONNECTING</span>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-section">
      <button class="new-chat-btn" onclick="newChat()">✦ New Chat</button>
    </div>
    <div class="sidebar-section">
      <h3>Recent Chats</h3>
      <div class="chat-history-list" id="history-list"></div>
    </div>
    <div class="sidebar-section">
      <h3>Quick Commands</h3>
      <div class="quick-cmd">
        <button class="quick-btn" onclick="quickSend('What is the current SOL price?')">◎ SOL Price</button>
        <button class="quick-btn" onclick="quickSend('Run an arb scan across Raydium, Orca and Meteora')">📈 Arb Scan</button>
        <button class="quick-btn" onclick="quickSend('Give me a P&L report')">📊 P&L Report</button>
        <button class="quick-btn" onclick="quickSend('What is the status of all my bots?')">⚙️ Bot Status</button>
        <button class="quick-btn" onclick="quickSend('What do you remember about me?')">🧠 My Memory</button>
        <button class="quick-btn" onclick="quickSend('Search the web for latest Solana DeFi news')">🔍 Solana News</button>
      </div>
    </div>
    <div class="sidebar-section">
      <h3>Stats</h3>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-val" id="stat-sol">--</div><div class="stat-lbl">SOL</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-ext">--</div><div class="stat-lbl">Extensions</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-chats">0</div><div class="stat-lbl">Chats</div></div>
        <div class="stat-item"><div class="stat-val" id="stat-mem">--</div><div class="stat-lbl">Memories</div></div>
      </div>
    </div>
    <div class="sidebar-section">
      <h3>Memory</h3>
      <div class="memory-sidebar" id="memory-sidebar">
        <div style="color:#4a5568;font-size:0.72rem">Loading...</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="chat-window" id="chat-window"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="chat-input" placeholder="Message JARVIS..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendChat()">↑</button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
const API = '';

// ── Storage ───────────────────────────────────────────────────────────────────
function loadSessions() {
  try { return JSON.parse(localStorage.getItem('jarvis_sessions') || '[]'); }
  catch(e) { return []; }
}
function saveSessions() {
  try { localStorage.setItem('jarvis_sessions', JSON.stringify(sessions)); }
  catch(e) {}
  document.getElementById('stat-chats').textContent = sessions.length;
}

let sessions = loadSessions();
let currentId = null;

function currentSession() {
  return sessions.find(s => s.id === currentId) || null;
}

// ── Session management ────────────────────────────────────────────────────────
function newChat() {
  const s = { id: Date.now(), title: 'New Chat', messages: [] };
  sessions.unshift(s);
  currentId = s.id;
  saveSessions();
  renderHistory();
  renderChat();
}

function loadSession(id) {
  currentId = id;
  renderHistory();
  renderChat();
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  if (currentId === id) currentId = sessions[0]?.id || null;
  saveSessions();
  renderHistory();
  renderChat();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!sessions.length) {
    el.innerHTML = '<div style="color:#4a5568;font-size:0.75rem;padding:0.25rem 0.5rem">No chats yet</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="history-item ${s.id === currentId ? 'active' : ''}" onclick="loadSession(${s.id})">
      <span>${escHtml(s.title)}</span>
      <button class="del-btn" onclick="deleteSession(${s.id}, event)">✕</button>
    </div>
  `).join('');
}

// ── Chat render ───────────────────────────────────────────────────────────────
function renderChat() {
  const win = document.getElementById('chat-window');
  const sess = currentSession();
  if (!sess || !sess.messages.length) {
    win.innerHTML = `
      <div class="empty-state">
        <h2>JARVIS MARK 5</h2>
        <p>What can I help you with today, sir?</p>
        <div class="chips">
          <div class="chip" onclick="quickSend('What is the current SOL price?')">◎ SOL Price</div>
          <div class="chip" onclick="quickSend('Generate a Python Raydium trading bot')">💻 Generate Bot</div>
          <div class="chip" onclick="quickSend('Search the web for Solana DeFi news today')">🔍 Search Web</div>
          <div class="chip" onclick="quickSend('What do you remember about me?')">🧠 My Memory</div>
          <div class="chip" onclick="quickSend('What can you do?')">⚡ Capabilities</div>
        </div>
      </div>`;
    return;
  }
  win.innerHTML = sess.messages.map(m => `
    <div class="message ${m.role}">
      <div class="msg-label">${m.role === 'user' ? 'YOU' : 'JARVIS'}</div>
      <div class="msg-bubble">${m.role === 'jarvis' ? formatMsg(m.content) : escHtml(m.content)}</div>
    </div>
  `).join('');
  win.scrollTop = win.scrollHeight;
}

function formatMsg(text) {
  text = escHtml(text);
  text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#e0e0e0">$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(t) {
  return String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Send message ──────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function quickSend(msg) {
  if (!currentId) newChat();
  document.getElementById('chat-input').value = msg;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  if (!currentId) newChat();
  const sess = currentSession();
  if (!sess) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  sess.messages.push({ role: 'user', content: msg });
  if (sess.title === 'New Chat') sess.title = msg.slice(0, 36) + (msg.length > 36 ? '…' : '');
  saveSessions();
  renderHistory();

  const win = document.getElementById('chat-window');
  win.innerHTML = sess.messages.map(m => `
    <div class="message ${m.role}">
      <div class="msg-label">${m.role === 'user' ? 'YOU' : 'JARVIS'}</div>
      <div class="msg-bubble">${m.role === 'jarvis' ? formatMsg(m.content) : escHtml(m.content)}</div>
    </div>
  `).join('');
  win.innerHTML += `
    <div class="message jarvis" id="thinking-msg">
      <div class="msg-label">JARVIS</div>
      <div class="msg-bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  win.scrollTop = win.scrollHeight;

  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, user_id: 1 })
    });
    const data = await r.json();
    sess.messages.push({ role: 'jarvis', content: data.reply || data.detail || 'No response.' });
  } catch(e) {
    sess.messages.push({ role: 'jarvis', content: '❌ Connection error.' });
  }

  saveSessions();
  document.getElementById('send-btn').disabled = false;
  renderChat();
}

// ── Data loaders ──────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  try { const r = await fetch(url); if (!r.ok) return null; return await r.json(); }
  catch(e) { return null; }
}

async function loadSol() {
  const d = await fetchJSON(API + '/api/sol');
  if (d && d.price) {
    const p = '$' + d.price.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('sol-ticker').textContent = '◎ ' + p;
    document.getElementById('stat-sol').textContent = p;
  }
}

async function checkHealth() {
  const d = await fetchJSON(API + '/api/health');
  const pill = document.getElementById('status-pill');
  if (d && d.status === 'ok') {
    pill.textContent = '● ONLINE';
    pill.style.color = '#00d97e';
    pill.style.background = '#00d97e15';
    pill.style.borderColor = '#00d97e30';
    document.getElementById('stat-ext').textContent = d.extensions ? d.extensions.length : 0;
  } else {
    pill.textContent = '● OFFLINE';
    pill.style.color = '#ff4466';
    pill.style.background = '#ff446615';
    pill.style.borderColor = '#ff446630';
  }
}

async function loadMemory() {
  const d = await fetchJSON(API + '/api/memory?user_id=1');
  const el = document.getElementById('memory-sidebar');
  const mems = (d && d.memories) ? d.memories : [];
  document.getElementById('stat-mem').textContent = mems.length;
  if (!mems.length) {
    el.innerHTML = '<div style="color:#4a5568;font-size:0.72rem">No memories yet</div>';
    return;
  }
  el.innerHTML = mems.slice(0, 8).map(m => `
    <div class="mem-chip">
      <span><span class="mkey">${escHtml(m.key)}:</span>${escHtml(m.value.slice(0,22))}${m.value.length>22?'…':''}</span>
      <button onclick="forgetMem('${escHtml(m.key)}')">✕</button>
    </div>
  `).join('');
}

async function forgetMem(key) {
  await fetch(API + '/api/memory/' + encodeURIComponent(key) + '?user_id=1', { method: 'DELETE' });
  loadMemory();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderHistory();
renderChat();
document.getElementById('stat-chats').textContent = sessions.length;
checkHealth();
loadSol();
loadMemory();
setInterval(loadSol, 30000);
setInterval(checkHealth, 15000);
setInterval(loadMemory, 60000);
</script>
</body>
</html>
