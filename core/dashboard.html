<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS Mark 5</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: #0a0a0f; 
    color: #e0e0e0; 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: #0d1117;
    border-bottom: 1px solid #1e2d3d;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { 
    color: #4db8ff; 
    font-size: 1rem; 
    letter-spacing: 3px;
    font-weight: 600;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .status-pill {
    font-size: 0.7rem;
    color: #00d97e;
    background: #00d97e15;
    border: 1px solid #00d97e30;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .sol-ticker {
    font-size: 0.8rem;
    color: #4db8ff;
    font-weight: 500;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    background: #0d1117;
    border-right: 1px solid #1e2d3d;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 1rem;
    border-bottom: 1px solid #1e2d3d;
  }
  .sidebar-section h3 {
    font-size: 0.65rem;
    color: #4a5568;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .new-chat-btn {
    width: 100%;
    background: #4db8ff15;
    border: 1px solid #4db8ff40;
    color: #4db8ff;
    padding: 0.6rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .new-chat-btn:hover { background: #4db8ff25; }

  .chat-history-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .history-item {
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    color: #8892a4;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .history-item:hover { background: #1a2332; color: #c9d1d9; }
  .history-item.active { background: #1a2332; color: #4db8ff; }
  .history-item .del-btn {
    background: none;
    border: none;
    color: #4a5568;
    cursor: pointer;
    font-size: 0.7rem;
    padding: 0;
    opacity: 0;
    flex-shrink: 0;
  }
  .history-item:hover .del-btn { opacity: 1; }
  .history-item .del-btn:hover { color: #ff4466; }

  .quick-cmd {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .quick-btn {
    background: none;
    border: none;
    color: #8892a4;
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .quick-btn:hover { background: #1a2332; color: #c9d1d9; }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .stat-item {
    background: #0a0a0f;
    border: 1px solid #1e2d3d;
    border-radius: 6px;
    padding: 0.5rem;
    text-align: center;
  }
  .stat-val { font-size: 0.9rem; color: #00d97e; font-weight: 600; }
  .stat-lbl { font-size: 0.62rem; color: #4a5568; margin-top: 2px; }

  .memory-sidebar {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 150px;
    overflow-y: auto;
  }
  .mem-chip {
    background: #0a0a0f;
    border: 1px solid #1e2d3d;
    border-radius: 4px;
    padding: 0.3rem 0.5rem;
    font-size: 0.75rem;
    color: #8892a4;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mem-chip .key { color: #4db8ff; margin-right: 0.3rem; }
  .mem-chip button {
    background: none;
    border: none;
    color: #4a5568;
    cursor: pointer;
    font-size: 0.65rem;
    padding: 0;
  }
  .mem-chip button:hover { color: #ff4466; }

  /* ── Main chat area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #0a0a0f;
  }

  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: #4a5568;
  }
  .empty-state h2 { 
    font-size: 1.5rem; 
    color: #4db8ff; 
    letter-spacing: 2px;
  }
  .empty-state p { font-size: 0.85rem; }

  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 0.5rem;
  }
  .chip {
    background: #0d1117;
    border: 1px solid #1e2d3d;
    color: #8892a4;
    padding: 0.5rem 1rem;
